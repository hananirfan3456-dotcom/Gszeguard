name: Android Super Fast Cloud Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Fast Unzip Project
      run: |
        unzip -q gazeguard-ai.zip -d target_project || true
        SRC_DIR=$(find target_project -name "build.gradle*" -exec dirname {} \; | head -n 1)
        if [ -n "$SRC_DIR" ]; then
          cp -rp $SRC_DIR/* . && cp -rp $SRC_DIR/.* . 2>/dev/null || true
        fi

    - name: Set up Java 17 with Cache
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Lightning Fast Build
      run: |
        chmod +x gradlew || true
        ./gradlew assembleDebug --no-daemon --parallel --build-cache

    - name: Upload Final APK
      uses: actions/upload-artifact@v4
      with:
        name: GazeGuard-Finished-App
        path: |
          **/build/outputs/apk/debug/*.apk
