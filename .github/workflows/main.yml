name: Android Fast Cloud Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Unzip Files Clean Way
      run: |
        mkdir project_folder
        unzip -q gazeguard-ai.zip -d project_folder
        find project_folder -name "build.gradle.kts" -exec dirname {} \; > path.txt
        PROJECT_PATH=$(cat path.txt | head -n 1)
        cp -r $PROJECT_PATH/* . || true

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Debug APK
      run: |
        chmod +x gradlew || true
        ./gradlew assembleDebug || gradle assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: GazeGuard-App
        path: app/build/outputs/apk/debug/app-debug.apk
