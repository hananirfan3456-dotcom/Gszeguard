name: Android ZIP Cloud Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Unzip Project Files
      run: |
        unzip -o gazeguard-ai.zip -d extracted_project
        mv extracted_project/*/* . || mv extracted_project/* . || true

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Build APK with Gradle
      run: gradle assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: GazeGuard-App
        path: app/build/outputs/apk/debug/app-debug.apk
